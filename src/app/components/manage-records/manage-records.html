<div class="container">

    <div class="header">

        <h2> Manage Registered Participants</h2>

        <div>

            <button class="register-btn" (click)="goToRegister()">
                + Register Participant
            </button>

            <button class="back-btn" (click)="backToDashboard()">
                Dashboard
            </button>

        </div>

    </div>

    <div class="table-card">

        <table *ngIf="participants.length > 0">

            <thead>

                <tr>

                    <th>#</th>

                    <th>Participant Name</th>

                    <th>Email</th>

                    <th>Event</th>

                    <th>Mobile</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let participant of participants; let i=index">

                    <td>{{i+1}}</td>

                    <td>{{participant.participantName}}</td>

                    <td>{{participant.email}}</td>

                    <td>{{participant.eventName}}</td>

                    <td>{{participant.mobileNumber}}</td>

                    <td>

                        <button
                            class="delete-btn"
                            (click)="deleteParticipant(participant.id)">

                            Delete

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

        <div
            class="empty"
            *ngIf="participants.length==0">

            <h3>No Participants Registered</h3>

            <p>Click Register Participant to add a new record.</p>

        </div>

    </div>

</div>
